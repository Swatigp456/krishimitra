{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">✏️ Edit Profile</h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">First Name</label>
                            <input type="text" name="first_name" class="form-control" value="{{ user.first_name }}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Last Name</label>
                            <input type="text" name="last_name" class="form-control" value="{{ user.last_name }}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Phone</label>
                            <input type="text" name="phone" class="form-control" value="{{ user.phone }}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Village <span class="text-danger">*</span></label>
                            <input type="text" name="village" class="form-control" value="{{ user.village }}" required>
                            <small class="text-muted">Enter your village name for accurate weather forecasts</small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">District</label>
                            <input type="text" name="district" class="form-control" value="{{ user.district }}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">State</label>
                            <input type="text" name="state" class="form-control" value="{{ user.state }}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Land Size (acres)</label>
                            <input type="number" name="land_size" class="form-control" value="{{ user.land_size }}" step="0.01">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Save Changes</button>
                        <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary w-100 mt-2">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
